<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datos - ChecaLifes+</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../tailwind.config.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

<nav class="bg-checa-blue p-4 text-white flex justify-between shadow-md">
  <h1 class="font-bold text-xl flex items-center gap-2">📋 ChecaLifes+</h1>
  <a href="../../index.html" class="hover:text-checa-green font-semibold">← Volver al Inicio</a>
</nav>

<main class="flex-grow flex items-center justify-center p-4">
  <section class="bg-white p-8 rounded-xl shadow-xl w-full max-w-4xl flex flex-col md:flex-row items-center gap-10">

    <!-- FORMULARIO -->
    <div class="w-full md:w-1/2">
      <h2 class="text-2xl font-bold mb-2 text-gray-800">Datos personales</h2>
      <p class="text-sm text-gray-500 mb-6">Paso 1 de 2: Cuéntanos un poco sobre ti.</p>

      <form id="formDatos" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nombres y Apellidos</label>
          <input type="text" id="nombre" placeholder="Ej. Juan Pérez" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-checa-blue outline-none" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Edad</label>
          <input type="number" id="edad" placeholder="Ej. 35" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-checa-blue outline-none" required min="1" max="120">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sexo Biológico</label>
          <select id="sexo" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-checa-blue outline-none" required>
            <option value="" disabled selected>Seleccionar...</option>
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">¿Fumas?</label>
            <select id="fuma" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-checa-blue outline-none" required>
              <option value="" disabled selected>Elegir</option>
              <option value="SI">Sí</option>
              <option value="NO">No</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">¿Bebes alcohol?</label>
            <select id="bebe" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-checa-blue outline-none" required>
              <option value="" disabled selected>Elegir</option>
              <option value="SI">Sí</option>
              <option value="NO">No</option>
            </select>
          </div>
        </div>

        <!-- El controlador interceptará este botón para redirigir a sintomas.html -->
        <button type="submit" class="bg-checa-blue hover:bg-checa-light-blue text-white font-bold px-4 py-3 rounded-lg w-full mt-4 transition">
          Continuar a Síntomas →
        </button>
      </form>
    </div>

    <!-- IMAGEN -->
    <div class="w-full md:w-1/2 hidden md:block">
      <img src="https://img.freepik.com/foto-gratis/doctor-sonriendo-senalando_23-2148075681.jpg" class="w-full rounded-lg shadow-md object-cover h-96" alt="Doctor indicando">
    </div>

  </section>
</main>

<script src="../../js/controllers/triajeController.js"></script>
</body>
</html>
