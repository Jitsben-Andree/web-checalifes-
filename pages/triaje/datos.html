<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Datos - ChecaLifes+</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-blue-600 p-4 text-white flex justify-between">
  <h1>ChecaLifes+</h1>
  <a href="../../index.html">Inicio</a>

</nav>

<section class="p-10 flex flex-col md:flex-row items-center gap-10">

<!-- FORMULARIO -->
<div class="bg-white p-6 rounded shadow w-full md:w-1/2">

<h2 class="text-xl font-bold mb-4">Datos personales</h2>

<form id="formDatos">

<input type="text" id="nombre" placeholder="Nombres y Apellidos" 
class="w-full p-2 border mb-3" required>

<input type="number" id="edad" placeholder="Edad" 
class="w-full p-2 border mb-3" required>

<select id="sexo" class="w-full p-2 border mb-3">
  <option value="">Sexo</option>
  <option>Masculino</option>
  <option>Femenino</option>
  <option>Prefiero no decirlo</option>
</select>

<select id="fuma" class="w-full p-2 border mb-3">
  <option value="">¿Fumas?</option>
  <option>SI</option>
  <option>NO</option>
  <option>EX-FUMADOR</option>
</select>

<select id="bebe" class="w-full p-2 border mb-3">
  <option value="">¿Bebes alcohol?</option>
  <option>SI</option>
  <option>NO</option>
  <option>EX-BEBEDOR</option>
</select>

<button type="submit" 
class="bg-blue-600 text-white px-4 py-2 rounded w-full">
Siguiente →
</button>

</form>
</div>

<!-- IMAGEN DERECHA -->
<div class="w-full md:w-1/2">
  <img src="https://img.freepik.com/foto-gratis/doctor-sonriendo-senalando_23-2148075681.jpg?semt=ais_hybrid&w=740&q=80"
       class="w-full max-w-md mx-auto">
</div>

</section>

<script src="../../js/controllers/triajeController.js"></script>

</body>
</html>
