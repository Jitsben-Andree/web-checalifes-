<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - ChecaLifes+</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../tailwind.config.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="bg-checa-blue p-4 text-white shadow-md">
  <div class="container mx-auto flex justify-between items-center">
    <h1 class="font-bold text-xl flex items-center gap-2">📋 ChecaLifes+</h1>
    <a href="../../index.html" class="hover:text-checa-green font-semibold">← Volver al Inicio</a>
  </div>
</nav>

<!-- CONTENIDO CENTRAL -->
<main class="flex-grow flex items-center justify-center p-4">
  <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-gray-800">¡Bienvenido!</h2>
      <p class="text-gray-500 mt-2">Inicia sesión para continuar con tu triaje.</p>
    </div>

    <!-- ALERTA DE ERROR (Oculta por defecto) -->
    <div id="loginAlert" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm font-medium text-center">
      Credenciales incorrectas.
    </div>

    <form id="formLogin" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">✉️</span>
          <input type="email" id="loginEmail" placeholder="tu@correo.com" class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-checa-blue outline-none transition" required>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔒</span>
          <input type="password" id="loginPassword" placeholder="••••••••" class="w-full pl-10 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-checa-blue outline-none transition" required>
        </div>
      </div>

      <button type="submit" class="w-full bg-checa-blue hover:bg-checa-light-blue text-white font-bold py-3 rounded-lg shadow-md transition transform hover:-translate-y-0.5">
        INGRESAR
      </button>
    </form>

    <div class="mt-6 text-center text-sm text-gray-600">
      ¿No tienes una cuenta? 
      <a href="registro.html" class="text-checa-blue font-bold hover:underline">Regístrate aquí</a>
    </div>
  </div>
</main>

<script src="../../js/controllers/authController.js"></script>
</body>
</html>
